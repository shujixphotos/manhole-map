<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>マンホールカード配布マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --iron:#26282B;
    --iron-2:#54585C;
    --brass:#C9A227;
    --stamp:#D9442F;
    --got:#2F9E44;
    --warn:#E8870C;
    --paper:#F7F5F0;
    --line:#E3DFD6;
    --radius:18px;
    --shadow:0 8px 30px rgba(38,40,43,.18);
    --ease-spring:cubic-bezier(.32,1.4,.45,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif;
    color:var(--iron);background:var(--paper);overflow:hidden;
  }

  /* ── ヘッダー ───────────────────────── */
  header{
    position:fixed;inset:0 0 auto 0;z-index:1000;
    display:flex;align-items:center;gap:12px;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
    background:linear-gradient(to bottom, rgba(247,245,240,.96) 60%, rgba(247,245,240,0));
    pointer-events:none;
  }
  header > *{pointer-events:auto}
  .logo{
    display:flex;align-items:center;gap:10px;flex-shrink:0;
    background:var(--iron);color:var(--paper);
    padding:8px 14px 8px 8px;border-radius:999px;box-shadow:var(--shadow);
  }
  .logo .lid{
    width:30px;height:30px;border-radius:50%;flex-shrink:0;
    background:
      radial-gradient(circle at 50% 50%, var(--brass) 0 18%, transparent 19%),
      repeating-conic-gradient(var(--iron-2) 0 10deg, var(--iron) 10deg 20deg);
    border:2px solid var(--brass);
    animation:spin 24s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .logo h1{font-size:14px;font-weight:900;letter-spacing:.04em;line-height:1.2}
  .logo h1 small{display:block;font-size:9px;font-weight:500;color:var(--brass);letter-spacing:.18em}

  .search{
    flex:1;max-width:420px;display:flex;align-items:center;gap:8px;
    background:#fff;border:1.5px solid var(--line);border-radius:999px;
    padding:9px 16px;box-shadow:var(--shadow);
    transition:border-color .25s, box-shadow .25s;
  }
  .search:focus-within{border-color:var(--brass);box-shadow:0 8px 30px rgba(201,162,39,.25)}
  .search svg{flex-shrink:0;opacity:.45}
  .search input{
    border:none;outline:none;width:100%;font:inherit;font-size:14px;background:transparent;color:var(--iron);
  }
  .search input::placeholder{color:#9b968c}

  /* ── 進捗 & フィルターバー ── */
  .toolbar{
    position:fixed;z-index:999;left:16px;right:16px;
    top:calc(64px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;pointer-events:none;
  }
  .toolbar > *{pointer-events:auto}
  .progress-chip{
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1.5px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:11px;font-weight:700;color:var(--iron-2);
    box-shadow:var(--shadow);
  }
  .progress-chip b{color:var(--got);font-size:13px;font-family:"IBM Plex Mono",monospace}
  .progress-chip .bar{
    width:54px;height:6px;border-radius:3px;background:var(--line);overflow:hidden;
  }
  .progress-chip .bar i{
    display:block;height:100%;width:0;background:var(--got);border-radius:3px;
    transition:width .6s var(--ease-spring);
  }
  .filters{display:flex;gap:6px}
  .fchip{
    border:1.5px solid var(--line);background:#fff;color:var(--iron-2);
    font:inherit;font-size:11px;font-weight:700;cursor:pointer;
    padding:6px 12px;border-radius:999px;box-shadow:var(--shadow);
    transition:all .25s var(--ease-spring);
  }
  .fchip.on{background:var(--iron);color:#fff;border-color:var(--iron);transform:scale(1.05)}
  .fchip:disabled{opacity:.5;cursor:wait}
  #refreshBtn .ico{display:inline-block;transition:transform .3s}
  #refreshBtn.loading .ico{animation:spin 1s linear infinite}

  /* ── 地図 ───────────────────────── */
  #map{position:fixed;inset:0;background:#EAE8E1}
  .leaflet-control-attribution{font-size:9px;background:rgba(255,255,255,.7)!important}
  .leaflet-control-zoom{border:none!important;box-shadow:var(--shadow)!important;border-radius:12px!important;overflow:hidden}
  .leaflet-control-zoom a{color:var(--iron)!important;border-color:var(--line)!important}
  .leaflet-top.leaflet-left{top:calc(112px + env(safe-area-inset-top))}

  /* ── マンホール型ピン ── */
  .mh-pin{
    width:34px;height:34px;border-radius:50%;cursor:pointer;position:relative;
    background:
      radial-gradient(circle at 50% 38%, rgba(255,255,255,.28) 0 22%, transparent 40%),
      radial-gradient(circle at 50% 50%, var(--c,#C9A227) 0 26%, transparent 27%),
      repeating-conic-gradient(#43474B 0 12deg, var(--iron) 12deg 24deg);
    border:2.5px solid var(--c,#C9A227);
    box-shadow:0 3px 10px rgba(0,0,0,.35), inset 0 -3px 5px rgba(0,0,0,.45);
    transform-origin:50% 100%;
    animation:drop .55s var(--ease-spring) backwards;
    transition:transform .25s var(--ease-spring), opacity .3s, filter .3s;
  }
  .mh-pin::after{
    content:"";position:absolute;inset:4px;border-radius:50%;
    border:1.5px dotted rgba(255,255,255,.4);
  }
  .mh-pin:hover{transform:scale(1.22)}
  @keyframes drop{
    0%{transform:translateY(-26px) scale(.3);opacity:0}
    60%{opacity:1}
    100%{transform:translateY(0) scale(1)}
  }
  .mh-pin.active{transform:scale(1.3)}
  .mh-pin.active::before{
    content:"";position:absolute;inset:-9px;border-radius:50%;
    border:2.5px solid var(--stamp);
    animation:pulse 1.6s ease-out infinite;
  }
  @keyframes pulse{
    0%{transform:scale(.7);opacity:1}
    100%{transform:scale(1.5);opacity:0}
  }
  .mh-pin.collected{filter:grayscale(1);opacity:.45}
  .mh-pin.collected.active{opacity:.8}
  .pin-badge{
    position:absolute;z-index:2;right:-7px;top:-7px;
    width:18px;height:18px;border-radius:50%;
    color:#fff;border:2px solid #fff;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:900;line-height:1;
    opacity:0;transform:scale(.3) rotate(-90deg);
    transition:all .4s var(--ease-spring);
    filter:none;
  }
  .mh-pin.collected .badge-got{opacity:1;transform:scale(1) rotate(-12deg)}
  .badge-got{background:var(--got)}
  .badge-warn{background:var(--warn);opacity:1;transform:scale(1)}
  .mh-pin.collected .badge-warn{display:none}
  .pin-multi{
    position:absolute;z-index:2;left:-7px;bottom:-5px;
    background:var(--iron);color:#fff;border:1.5px solid #fff;
    font-size:8.5px;font-weight:900;font-family:"IBM Plex Mono",monospace;
    padding:1px 5px;border-radius:999px;line-height:1.3;
  }

  /* クラスター */
  .mh-cluster{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:44px;border-radius:50%;
    background:repeating-conic-gradient(#43474B 0 12deg, var(--iron) 12deg 24deg);
    border:3px solid var(--brass);
    color:#fff;font-weight:900;font-size:14px;font-family:"IBM Plex Mono",monospace;
    box-shadow:0 4px 14px rgba(0,0,0,.35), inset 0 -4px 6px rgba(0,0,0,.45);
    text-shadow:0 1px 3px rgba(0,0,0,.7);
    transition:transform .25s var(--ease-spring);
  }
  .mh-cluster:hover{transform:scale(1.12)}

  /* 現在地マーカー */
  .me-dot{
    width:18px;height:18px;border-radius:50%;
    background:#1971C2;border:3px solid #fff;
    box-shadow:0 0 0 0 rgba(25,113,194,.45);
    animation:me-pulse 2s ease-out infinite;
  }
  @keyframes me-pulse{
    0%{box-shadow:0 0 0 0 rgba(25,113,194,.45)}
    100%{box-shadow:0 0 0 18px rgba(25,113,194,0)}
  }

  /* ── 詳細シート ── */
  .sheet{
    position:fixed;z-index:1100;
    background:#fff;border-radius:var(--radius);
    box-shadow:0 -10px 40px rgba(38,40,43,.28);
    display:flex;flex-direction:column;overflow:hidden;
    transition:transform .45s var(--ease-spring), opacity .35s;
  }
  @media (max-width:767px){
    .sheet{
      left:10px;right:10px;bottom:0;max-height:68vh;
      border-radius:var(--radius) var(--radius) 0 0;
      transform:translateY(110%);
      padding-bottom:env(safe-area-inset-bottom);
    }
    .sheet.open{transform:translateY(0)}
  }
  @media (min-width:768px){
    .sheet{
      top:120px;right:20px;width:370px;max-height:calc(100vh - 150px);
      transform:translateX(120%);opacity:0;
    }
    .sheet.open{transform:translateX(0);opacity:1}
  }
  .sheet-grab{padding:10px 0 2px;display:flex;justify-content:center}
  .sheet-grab span{width:40px;height:4px;border-radius:2px;background:var(--line)}
  @media (min-width:768px){.sheet-grab{display:none}}

  .sheet-body{overflow-y:auto;padding:6px 18px 18px;-webkit-overflow-scrolling:touch}

  .card-head{
    border:2.5px solid var(--c,var(--brass));border-radius:14px;overflow:hidden;
    margin-top:8px;
  }
  .card-title{
    background:var(--iron);color:#fff;padding:12px 14px;
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  }
  .card-title h2{font-size:17px;font-weight:900;letter-spacing:.02em}
  .pref-badge{
    flex-shrink:0;font-size:10px;font-weight:700;color:var(--iron);
    background:var(--c,var(--brass));padding:3px 9px;border-radius:999px;
  }
  .status-banner{
    display:flex;align-items:center;gap:6px;
    background:#FFF4E0;color:#9A5B00;border:1.5px dashed var(--warn);
    border-radius:10px;padding:8px 12px;margin-top:10px;
    font-size:12px;font-weight:700;line-height:1.5;
  }

  .cards-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .card-row{
    display:flex;align-items:center;gap:10px;
    border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;
    transition:background .3s, border-color .3s;
  }
  .card-row.got{background:#F0FAF2;border-color:var(--got)}
  .card-row .mini-lid{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;position:relative;
    background:
      radial-gradient(circle at 50% 50%, var(--c,#C9A227) 0 26%, transparent 27%),
      repeating-conic-gradient(#43474B 0 12deg, var(--iron) 12deg 24deg);
    border:2px solid var(--c,#C9A227);
    transition:filter .3s, opacity .3s;
  }
  .card-row.got .mini-lid{filter:grayscale(1);opacity:.5}
  .card-row .card-meta{flex:1;min-width:0}
  .card-row .card-meta .dan{font-size:12.5px;font-weight:900}
  .card-row .card-meta .code{
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--iron-2);
  }
  .get-btn{
    flex-shrink:0;border:2px solid var(--got);background:#fff;color:var(--got);
    font:inherit;font-size:11.5px;font-weight:900;cursor:pointer;
    padding:7px 12px;border-radius:999px;
    transition:all .25s var(--ease-spring);
  }
  .get-btn.on{background:var(--got);color:#fff;transform:rotate(-3deg) scale(1.05)}

  dl.info{margin-top:14px;display:grid;grid-template-columns:auto 1fr;gap:8px 12px;font-size:13px}
  dl.info dt{
    font-size:10px;font-weight:700;color:var(--iron-2);letter-spacing:.1em;
    background:var(--paper);border:1px solid var(--line);border-radius:6px;
    padding:3px 8px;height:fit-content;white-space:nowrap;
  }
  dl.info dd{line-height:1.55}
  dl.info dd .addr{display:block;font-size:11px;color:var(--iron-2);margin-top:2px}
  .sub-place{
    margin-top:10px;border-left:3px solid var(--line);padding:2px 0 2px 10px;
    font-size:12px;line-height:1.6;color:var(--iron-2);
  }
  .sub-place b{color:var(--iron);font-size:12.5px}
  .note{margin-top:12px;font-size:11.5px;line-height:1.7;color:var(--iron-2)}
  .geo-note{
    margin-top:12px;font-size:10.5px;color:#9b968c;line-height:1.6;
    border-top:1px dashed var(--line);padding-top:8px;
  }

  .actions{display:flex;gap:10px;margin-top:14px}
  .btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    padding:11px;border-radius:12px;border:none;cursor:pointer;
    font:inherit;font-size:13px;font-weight:700;text-decoration:none;
    transition:transform .2s var(--ease-spring);
  }
  .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--iron);color:#fff}
  .btn-ghost{background:var(--paper);border:1.5px solid var(--line);color:var(--iron)}

  .sheet-close{
    position:absolute;top:10px;right:10px;z-index:2;
    width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(38,40,43,.55);color:#fff;font-size:15px;line-height:1;
    backdrop-filter:blur(4px);
  }

  .toast{
    position:fixed;z-index:1200;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));
    transform:translate(-50%,20px);opacity:0;pointer-events:none;
    background:var(--iron);color:#fff;font-size:12.5px;font-weight:700;
    padding:10px 18px;border-radius:999px;box-shadow:var(--shadow);
    transition:transform .35s var(--ease-spring), opacity .3s;
    max-width:88vw;text-align:center;line-height:1.5;
  }
  .toast.show{transform:translate(-50%,0);opacity:1}

  /* ── 新弾お知らせバナー ── */
  .notice{
    position:fixed;z-index:1150;left:12px;right:12px;
    bottom:calc(16px + env(safe-area-inset-bottom));
    display:flex;align-items:center;gap:10px;
    background:#FFF8E8;border:2px solid var(--brass);color:#6B5200;
    border-radius:14px;padding:11px 14px;box-shadow:var(--shadow);
    font-size:12.5px;font-weight:700;line-height:1.55;
    transform:translateY(140%);opacity:0;
    transition:transform .5s var(--ease-spring), opacity .4s;
  }
  .notice.show{transform:translateY(0);opacity:1}
  .notice .n-ico{font-size:18px;flex-shrink:0}
  .notice .n-body{flex:1}
  .notice .n-body small{display:block;font-weight:500;font-size:10.5px;color:#9A7B00;margin-top:2px}
  .notice .n-close{
    flex-shrink:0;border:none;background:transparent;color:#6B5200;
    font-size:16px;cursor:pointer;padding:4px;line-height:1;
  }
  @media (min-width:768px){
    .notice{left:auto;right:20px;max-width:380px}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="lid"></div>
    <h1>マンホールカード<br>配布マップ<small>MANHOLE CARD MAP</small></h1>
  </div>
  <div class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="q" type="search" placeholder="都市名・都道府県・弾(例: 27)で検索" autocomplete="off">
  </div>
</header>

<div class="toolbar">
  <div class="progress-chip">
    取得 <b id="gotNum">0</b>/<span id="totalNum">0</span>
    <span class="bar"><i id="progressBar"></i></span>
  </div>
  <div class="filters" role="tablist">
    <button class="fchip on" data-f="all">すべて</button>
    <button class="fchip" data-f="todo">未取得</button>
    <button class="fchip" data-f="got">取得済</button>
  </div>
  <button class="fchip" id="refreshBtn" title="配布データを最新に更新します"><span class="ico">↻</span> データ更新</button>
  <button class="fchip" id="locateBtn" title="現在地周辺の配布場所を探します">📍 現在地</button>
</div>

<div id="map"></div>

<aside class="sheet" id="sheet" aria-hidden="true">
  <button class="sheet-close" id="sheetClose" aria-label="閉じる">✕</button>
  <div class="sheet-grab"><span></span></div>
  <div class="sheet-body" id="sheetBody"></div>
</aside>

<div class="toast" id="toast"></div>

<div class="notice" id="notice" role="status">
  <span class="n-ico">🆕</span>
  <span class="n-body" id="noticeBody"></span>
  <button class="n-close" id="noticeClose" aria-label="閉じる">✕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script>
/* ==============================================================
   ▼データ更新の仕組み
   1. manhole-data.json をWeb上(GitHub Pages / Gist / 自サイト等)に置く
   2. 下の DATA_URL にそのURLを設定する
   3. 画面の「↻ データ更新」ボタンで最新JSONを取得して反映する
      (取得したデータはブラウザに保存され、次回以降も使われます)
   DATA_URL が空のままでも、HTML内蔵のデータで動作します。
   ============================================================== */
const DATA_URL = "./manhole-data.json"; // 同じ場所に置いた manhole-data.json を読む

/* 地域カラー(GKPのカードが9地域で色分けされているのに倣う) */
const REGION_COLOR = {
  "北海道":"#7048E8", "東北":"#1971C2", "関東":"#E64980",
  "北陸":"#0CA678", "中部":"#F59F00", "近畿":"#E8590C",
  "中国":"#C92A2A", "四国":"#74B816", "九州":"#3B5BDB",
};

/* ── データ読み込み(キャッシュ済みの更新データ > 内蔵データ) ── */
const DATA_CACHE_KEY = 'mhc-data-cache-v1';
let DATA = BUNDLED_DATA;
try{
  const cached = localStorage.getItem(DATA_CACHE_KEY);
  if(cached){
    const d = JSON.parse(cached);
    if(d && Array.isArray(d.spots) && d.spots.length) DATA = d;
  }
}catch(e){}

let SPOTS = [];
let ALL_CARDS = [];
const cardKey = (spot, card) => `${spot.id}__${card.dan}-${card.code}`;

function applyData(d){
  DATA = d;
  SPOTS = d.spots;
  ALL_CARDS = SPOTS.flatMap(s => s.cards.map(c => cardKey(s, c)));
}
applyData(DATA);

/* ── 取得済みデータの保存(ブラウザ内に永続化) ── */
const STORE_KEY = 'mhc-collected-v2';
let collected = new Set();
try{
  const saved = localStorage.getItem(STORE_KEY);
  if(saved) collected = new Set(JSON.parse(saved));
}catch(e){}
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify([...collected])); }catch(e){}
}
const spotAllGot = s => s.cards.every(c => collected.has(cardKey(s,c)));
const spotAnyTodo = s => s.cards.some(c => !collected.has(cardKey(s,c)));

/* ── 地図初期化(国土地理院 淡色タイル) ── */
const map = L.map('map', {zoomControl:true}).setView([36.5, 137.8], 5);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution:'地図: <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  maxZoom:18,
}).addTo(map);

/* ── ピン生成 ── */
function makeIcon(spot, i){
  const got = spotAllGot(spot);
  const color = REGION_COLOR[spot.region] || '#C9A227';
  const warn = spot.status ? `<span class="pin-badge badge-warn">!</span>` : '';
  const multi = spot.cards.length > 1 ? `<span class="pin-multi">×${spot.cards.length}</span>` : '';
  return L.divIcon({
    className:'',
    html:`<div class="mh-pin ${got?'collected':''}" style="--c:${color};animation-delay:${Math.min(i*25,800)}ms">
            <span class="pin-badge badge-got">✓</span>${warn}${multi}
          </div>`,
    iconSize:[34,34], iconAnchor:[17,17],
  });
}

const cluster = L.markerClusterGroup({
  showCoverageOnHover:false,
  maxClusterRadius:48,
  iconCreateFunction: c => L.divIcon({
    className:'', iconSize:[44,44],
    html:`<div class="mh-cluster">${c.getChildCount()}</div>`,
  }),
});
map.addLayer(cluster);

/* ── 状態 ── */
let query = '';
let mode = 'all';
let markers = [];
let activeMarker = null;

function spotSearchText(s){
  const dans = s.cards.map(c=>`第${c.dan}弾 ${c.dan}弾 ${c.dan}`).join(' ');
  return `${s.city} ${s.pref} ${s.place} ${s.region} ${dans}`;
}

function visibleSpots(){
  return SPOTS.filter(s=>{
    if(query && !spotSearchText(s).includes(query)) return false;
    if(mode==='todo' && !spotAnyTodo(s)) return false;
    if(mode==='got' && !spotAllGot(s)) return false;
    return true;
  });
}

function rebuild({fly=false}={}){
  const list = visibleSpots();
  cluster.clearLayers();
  markers = list.map((s,i)=>{
    const m = L.marker([s.lat, s.lng], {icon:makeIcon(s,i)});
    m.spot = s;
    m.on('click', ()=> selectSpot(m));
    return m;
  });
  cluster.addLayers(markers);
  updateProgress();
  if(fly && list.length){
    const b = L.latLngBounds(list.map(s=>[s.lat,s.lng]));
    map.flyToBounds(b, {padding:[70,70], duration:.9, maxZoom:11});
  }
  return list;
}

function updateProgress(){
  const got = ALL_CARDS.filter(k => collected.has(k)).length;
  document.getElementById('gotNum').textContent = got;
  document.getElementById('totalNum').textContent = ALL_CARDS.length;
  document.getElementById('progressBar').style.width =
    ALL_CARDS.length ? (got/ALL_CARDS.length*100)+'%' : '0%';
}

/* ── 詳細シート ── */
const sheet = document.getElementById('sheet');
const sheetBody = document.getElementById('sheetBody');

function selectSpot(marker){
  const s = marker.spot;
  if(activeMarker){
    activeMarker.getElement()?.querySelector('.mh-pin')?.classList.remove('active');
  }
  marker.getElement()?.querySelector('.mh-pin')?.classList.add('active');
  activeMarker = marker;

  renderSheet(s);
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden','false');

  const isMobile = matchMedia('(max-width:767px)').matches;
  map.flyTo([s.lat - (isMobile? 0.012:0), s.lng], Math.max(map.getZoom(), 12), {duration:1.1, easeLinearity:.22});
}

function renderSheet(s){
  const color = REGION_COLOR[s.region] || '#C9A227';
  const statusHtml = s.status
    ? `<div class="status-banner">⚠️ ${s.status==='休止' ? '配布休止中' : '配布開始前'} — ${s.statusNote||''}</div>` : '';

  const cardsHtml = s.cards.map(c=>{
    const key = cardKey(s,c);
    const got = collected.has(key);
    return `
      <div class="card-row ${got?'got':''}">
        <div class="mini-lid" style="--c:${color}"></div>
        <div class="card-meta">
          <div class="dan">第${c.dan}弾</div>
          <div class="code">${c.code}</div>
        </div>
        <button class="get-btn ${got?'on':''}" data-key="${key}">${got?'✓ GET!':'取得した'}</button>
      </div>`;
  }).join('');

  const subHtml = (s.subPlaces||[]).map(p=>`
    <div class="sub-place">
      <b>【${p.label}】${p.place}</b><br>${p.address}<br>${p.hours}
    </div>`).join('');

  sheetBody.innerHTML = `
    <div class="card-head" style="--c:${color}">
      <div class="card-title">
        <h2>${s.city}</h2>
        <span class="pref-badge">${s.pref} / ${s.region}</span>
      </div>
    </div>
    ${statusHtml}
    <div class="cards-list">${cardsHtml}</div>
    <dl class="info">
      <dt>配布場所</dt><dd>${s.place}<span class="addr">${s.address}</span></dd>
      <dt>配布時間</dt><dd>${s.hours}</dd>
    </dl>
    ${subHtml}
    ${s.note ? `<p class="note">📝 ${s.note}</p>` : ''}
    <div class="actions">
      <a class="btn btn-primary" target="_blank" rel="noopener"
         href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.place.replace(/（.*?）|\(.*?\)/g,'') + ' ' + s.address)}">経路を調べる</a>
      <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
    </div>
    <p class="geo-note">※ピンの位置は目安です。正確な場所は「経路を調べる」から確認してください。配布場所・時間・休止状況は変更されることがあるため、訪問前に各自治体の公式情報の確認をおすすめします。(データ: ${DATA.version||'-'}時点)</p>`;

  sheetBody.querySelectorAll('.get-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> toggleCard(s, btn.dataset.key));
  });
}

function toggleCard(s, key){
  const nowGot = !collected.has(key);
  if(nowGot) collected.add(key); else collected.delete(key);
  persist();
  renderSheet(s);

  const el = activeMarker?.getElement()?.querySelector('.mh-pin');
  if(el) el.classList.toggle('collected', spotAllGot(s));
  updateProgress();

  if(nowGot) showToast(`${s.city} のカードを取得済みにしました 🎉`);
  if(mode!=='all'){
    setTimeout(()=>{ if(!sheet.classList.contains('open')) rebuild(); }, 400);
  }
}

function closeSheet(){
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden','true');
  if(activeMarker){
    activeMarker.getElement()?.querySelector('.mh-pin')?.classList.remove('active');
    activeMarker = null;
  }
  if(mode!=='all') rebuild();
}
document.getElementById('sheetClose').addEventListener('click', closeSheet);
map.on('click', closeSheet);

/* ── トースト ── */
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg, ms=2400){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), ms);
}

/* ── データ更新 ── */
const refreshBtn = document.getElementById('refreshBtn');

async function fetchLatest({silent=false}={}){
  if(!DATA_URL){
    if(!silent) showToast('更新用URLが未設定です。HTML内の DATA_URL に manhole-data.json の公開URLを設定してください。', 4200);
    return;
  }
  refreshBtn.classList.add('loading');
  refreshBtn.disabled = true;
  try{
    const res = await fetch(DATA_URL + (DATA_URL.includes('?')?'&':'?') + 't=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if(!d || !Array.isArray(d.spots) || !d.spots.length) throw new Error('データ形式が不正です');
    const beforeDans = new Set(SPOTS.flatMap(s=>s.cards.map(c=>c.dan)));
    const beforeCount = ALL_CARDS.length;
    const changed = d.version !== DATA.version || d.spots.length !== SPOTS.length;
    try{ localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(d)); }catch(e){}
    applyData(d);
    closeSheet();
    rebuild();
    const addedDans = [...new Set(SPOTS.flatMap(s=>s.cards.map(c=>c.dan)))]
      .filter(n=>!beforeDans.has(n)).sort((a,b)=>a-b);
    let msg;
    if(addedDans.length){
      msg = `第${addedDans.join('・')}弾(+${ALL_CARDS.length-beforeCount}種)が追加されました!全${ALL_CARDS.length}種`;
    }else if(changed){
      msg = `配布データを${d.version||'最新版'}に更新しました(全${ALL_CARDS.length}種)`;
    }else{
      msg = `データは最新です(${d.version||'-'} / 全${ALL_CARDS.length}種)`;
    }
    if(!silent) showToast(msg, 3600);
    else if(changed) showToast(msg, 3600);
    checkNewDan();
  }catch(err){
    /* オフラインや取得失敗時は、手元のデータ(キャッシュ/内蔵)のままで動く */
    if(!silent) showToast('更新に失敗しました。通信環境とDATA_URLを確認してください。', 3600);
  }finally{
    refreshBtn.classList.remove('loading');
    refreshBtn.disabled = false;
  }
}
refreshBtn.addEventListener('click', ()=> fetchLatest());

/* ── 新弾チェック ──
   GitHub Actionsが週1回GKP公式を確認して latest-info.json に
   最新の弾番号を記録する。ここではそれと手元データを比較して、
   未収録の弾があればお知らせバナーを出す。 */
const notice = document.getElementById('notice');
const noticeBody = document.getElementById('noticeBody');
document.getElementById('noticeClose').addEventListener('click', ()=> notice.classList.remove('show'));

const maxDan = () => Math.max(0, ...SPOTS.flatMap(s=>s.cards.map(c=>c.dan)));

async function checkNewDan(){
  try{
    const res = await fetch('./latest-info.json?t=' + Date.now(), {cache:'no-store'});
    if(!res.ok) return;
    const info = await res.json();
    const have = maxDan();
    if(info && Number.isFinite(info.latestDan) && info.latestDan > have){
      noticeBody.innerHTML =
        `<b>第${info.latestDan}弾が発表されています!</b>` +
        `<small>このマップは第${have}弾まで収録。データ更新をお待ちください(${info.checkedAt||''}確認)</small>`;
      notice.classList.add('show');
    }else{
      notice.classList.remove('show');
    }
  }catch(e){ /* 未設置・取得失敗時は何もしない */ }
}

/* ── 現在地 ── */
let meMarker = null;
function distKm(aLat,aLng,bLat,bLng){
  const R=6371, rad=x=>x*Math.PI/180;
  const dLat=rad(bLat-aLat), dLng=rad(bLng-aLng);
  const h=Math.sin(dLat/2)**2 + Math.cos(rad(aLat))*Math.cos(rad(bLat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
document.getElementById('locateBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){
    showToast('この端末では位置情報を利用できません');
    return;
  }
  showToast('現在地を取得しています…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lng} = pos.coords;
    if(meMarker) meMarker.remove();
    meMarker = L.marker([lat,lng], {
      icon:L.divIcon({className:'', html:'<div class="me-dot"></div>', iconSize:[18,18], iconAnchor:[9,9]}),
      zIndexOffset:1000, interactive:false,
    }).addTo(map);
    map.flyTo([lat,lng], 11, {duration:1.1});

    /* 一番近い「未取得・配布中」の場所を案内 */
    const candidates = SPOTS.filter(s => spotAnyTodo(s) && !s.status);
    if(candidates.length){
      const nearest = candidates.reduce((a,b)=>
        distKm(lat,lng,a.lat,a.lng) <= distKm(lat,lng,b.lat,b.lng) ? a : b);
      const d = distKm(lat,lng,nearest.lat,nearest.lng);
      showToast(`いちばん近い未取得: ${nearest.city}「${nearest.place}」(約${d<10?d.toFixed(1):Math.round(d)}km)`, 4200);
    }
  }, err=>{
    showToast('現在地を取得できませんでした。位置情報の許可を確認してください。', 3600);
  }, {enableHighAccuracy:true, timeout:10000});
});

/* ── 検索 ── */
document.getElementById('q').addEventListener('input', e=>{
  query = e.target.value.trim();
  closeSheet();
  const list = rebuild({fly: !!query});
  if(query && list.length===0) showToast(`「${query}」に一致する配布場所はありません`);
});

/* ── フィルターチップ ── */
document.querySelectorAll('.fchip[data-f]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.fchip[data-f]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    mode = btn.dataset.f;
    closeSheet();
    const list = rebuild();
    if(list.length===0){
      showToast(mode==='got' ? 'まだ取得済みのカードがありません' : 'すべて取得済みです!おめでとうございます 🎉');
    }
  });
});

/* 初期表示 */
rebuild();
if(AUTO_UPDATE_ON_LOAD && location.protocol !== 'file:'){
  fetchLatest({silent:true}); // 完了時に checkNewDan() も呼ばれる
}else if(location.protocol !== 'file:'){
  checkNewDan();
}
</script>
</body>
</html>
