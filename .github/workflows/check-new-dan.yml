# 新弾チェック
# 毎週金曜の朝(日本時間6時ごろ)にGKP公式サイトを確認し、
# 発表されている最新の弾番号を latest-info.json に記録します。
# サイト側はこのファイルを読んで「第◯弾が出てますよ」のお知らせを表示します。
#
# 設置場所: リポジトリの .github/workflows/check-new-dan.yml
# 手動実行: GitHubの Actions タブ → 「新弾チェック」 → Run workflow

name: 新弾チェック

on:
  schedule:
    - cron: '0 21 * * 4'   # 毎週木曜21:00 UTC = 金曜6:00 JST(新弾は金曜配布開始が通例)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GKP公式サイトから最新の弾番号を取得
        run: |
          python3 - <<'EOF'
          import re, json, datetime, urllib.request

          url = 'https://www.gk-p.jp/mhcard/'
          req = urllib.request.Request(url, headers={
              'User-Agent': 'Mozilla/5.0 (manhole-map new-dan checker; personal use; weekly)'
          })
          html = urllib.request.urlopen(req, timeout=30).read().decode('utf-8', 'ignore')

          # ページ内の「第◯弾」表記から最大の弾番号を拾う
          dans = [int(n) for n in re.findall(r'第\s*(\d{1,3})\s*弾', html)]
          dans = [n for n in dans if 1 <= n <= 200]  # 念のため異常値を除外

          # 取得に失敗した場合は前回の値を維持する
          prev = None
          try:
              prev = json.load(open('latest-info.json', encoding='utf-8'))
          except Exception:
              pass

          latest = max(dans) if dans else (prev or {}).get('latestDan')

          out = {
              'latestDan': latest,
              'checkedAt': datetime.date.today().isoformat(),
              'source': url,
          }
          json.dump(out, open('latest-info.json', 'w', encoding='utf-8'),
                    ensure_ascii=False, indent=2)
          print('result:', out)
          EOF

      - name: 変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-info.json
          git diff --cached --quiet || git commit -m "新弾チェック: $(date +%Y-%m-%d)"
          git push
